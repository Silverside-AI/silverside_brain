# Model Registry
#
# Declarative list of models the platform can call. The agent never references this
# directly — it calls capability-shaped tools (generate_image, edit_image, draft_response,
# transcribe_audio, etc.) and the tool layer resolves the model via this file.
#
# Adding a new model is a PR to this file. No agent code changes required.
#
# Tiers:
#   fast      — cheap, low-latency, lower quality. Used for routing/classification.
#   standard  — default workhorse for most skills.
#   deep      — high-quality, expensive. Used on escalation or for critical skills.
#
# Each skill declares default / fallback / escalation in its SKILL.md frontmatter.

# ---------------------------------------------------------------------------
# Text / chat models  (provider: openrouter)
# ---------------------------------------------------------------------------
